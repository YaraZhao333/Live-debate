services:
  - type: web
    name: live-debate-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: live-debate-gateway
    runtime: node
    plan: free
    buildCommand: cd gateway && npm install
    startCommand: cd gateway && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        fromService:
          name: live-debate-backend
          type: web
          property: host
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: live-debate-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true
