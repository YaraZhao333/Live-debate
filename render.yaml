services:
  - type: web
    name: live-debate-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: live-debate-gateway
    runtime: node
    buildCommand: cd gateway && npm install
    startCommand: cd gateway && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: https://live-debate-backend.onrender.com
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: live-debate-frontend
    env: static
    buildCommand: ""
    staticPublishPath: frontend/unpackage/dist/build/web
    autoDeploy: true

  - type: web
    name: live-debate-admin
    env: static
    buildCommand: ""
    staticPublishPath: frontend/admin
    autoDeploy: true
