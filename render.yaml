services:
  # 后端服务（同时提供前端静态资源）
  - type: web
    name: live-debate-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/admin/votes
